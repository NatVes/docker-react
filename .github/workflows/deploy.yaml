name: Deploy Frontend
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t nataliaveselova/react-test -f Dockerfile.dev .
      - run: docker run -e CI=true nataliaveselova/react-test npm test

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/app
            git pull origin main
            sudo docker build -t nataliaveselova/react-app:latest .
            sudo docker rm -f react-app || true
            sudo docker run -d --name react-app --restart unless-stopped -p 80:80 nataliaveselova/react-app:latest
